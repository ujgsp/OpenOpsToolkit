---
# WordPress Role - Main Tasks

- name: Include variables
  include_vars: main.yml

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - unzip
      - git
    state: present

- name: Add PHP repository
  apt_repository:
    repo: "ppa:ondrej/php"
    update_cache: yes

- name: Install PHP {{ php_version }}
  apt:
    name:
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-soap"
      - "php{{ php_version }}-imagick"
    state: present

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Install MySQL
  apt:
    name:
      - mysql-server
      - mysql-client
      - python3-mysqldb
    state: present

- name: Start and enable MySQL
  systemd:
    name: mysql
    state: started
    enabled: yes

- name: Create MySQL database
  mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create MySQL user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create web root directory
  file:
    path: "/var/www/{{ app_name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Download WordPress
  get_url:
    url: "https://wordpress.org/latest.tar.gz"
    dest: "/tmp/wordpress.tar.gz"
    mode: '0644'

- name: Extract WordPress
  unarchive:
    src: "/tmp/wordpress.tar.gz"
    dest: "/tmp"
    remote_src: yes

- name: Copy WordPress files
  copy:
    src: "/tmp/wordpress/"
    dest: "/var/www/{{ app_name }}/"
    remote_src: yes
    owner: www-data
    group: www-data

- name: Configure WordPress
  template:
    src: wp-config.php.j2
    dest: "/var/www/{{ app_name }}/wp-config.php"
    owner: www-data
    group: www-data
    mode: '0640'

- name: Configure Nginx
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}"
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Enable Nginx site
  file:
    src: "/etc/nginx/sites-available/{{ app_name }}"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}"
    state: link
  notify: restart nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Set file permissions
  file:
    path: "/var/www/{{ app_name }}"
    owner: www-data
    group: www-data
    mode: '0755'
    recurse: yes

- name: Start and enable services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - nginx
    - "php{{ php_version }}-fpm"
    - mysql

- name: Configure firewall
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '22'
    - '80'
    - '443'

- name: Enable firewall
  ufw:
    state: enabled
    policy: deny

- name: Install Certbot for SSL
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: ssl_enabled | bool

- name: Check if SSL certificate exists
  stat:
    path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  register: wp_ssl_cert_stat

- name: Obtain SSL certificate
  command: >
    certbot --nginx -d {{ domain }}
    --non-interactive --agree-tos -m {{ ssl_email }}
  when:
    - ssl_enabled | bool
    - not wp_ssl_cert_stat.stat.exists

- name: Display deployment information
  debug:
    msg: |
      WordPress deployed successfully!
      
      Application: {{ app_name }}
      URL: http{% if ssl_enabled %}s{% endif %}://{{ domain }}
      Directory: /var/www/{{ app_name }}
      Database: {{ db_name }}
      
      Admin URL: http{% if ssl_enabled %}s{% endif %}://{{ domain }}/wp-admin
      Admin User: {{ wp_admin_user }}