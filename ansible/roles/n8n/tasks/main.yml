---
# n8n Role - Main Tasks

- name: Include variables
  include_vars: main.yml

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - unzip
      - git
    state: present

- name: Create n8n directory
  file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create n8n subdirectories
  file:
    path: "{{ n8n_data_dir }}/{{ item }}"
    state: directory
    owner: 1000
    group: 1000
    mode: '0755'
  loop:
    - data
    - config

- name: Create Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: Create environment file
  template:
    src: env.j2
    dest: "{{ n8n_data_dir }}/.env"
    owner: root
    group: root
    mode: '0600'

- name: Start n8n with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ n8n_data_dir }}"
    state: present
  register: docker_compose_result

- name: Wait for n8n to be ready
  uri:
    url: "http://localhost:{{ n8n_port }}"
    method: GET
    status_code: 200
  register: n8n_health
  retries: 30
  delay: 5
  until: n8n_health.status == 200

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Configure Nginx
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/n8n"
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Enable Nginx site
  file:
    src: "/etc/nginx/sites-available/n8n"
    dest: "/etc/nginx/sites-enabled/n8n"
    state: link
  notify: restart nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Configure firewall
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '22'
    - '80'
    - '443'

- name: Enable firewall
  ufw:
    state: enabled
    policy: deny

- name: Install Certbot for SSL
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: n8n_ssl_enabled | bool

- name: Check if SSL certificate exists
  stat:
    path: "/etc/letsencrypt/live/{{ n8n_domain }}/fullchain.pem"
  register: n8n_ssl_cert_stat

- name: Obtain SSL certificate
  command: >
    certbot --nginx -d {{ n8n_domain }}
    --non-interactive --agree-tos -m {{ n8n_ssl_email }}
  when:
    - n8n_ssl_enabled | bool
    - not n8n_ssl_cert_stat.stat.exists

- name: Display deployment information
  debug:
    msg: |
      n8n deployed successfully!
      
      URL: http{% if n8n_ssl_enabled %}s{% endif %}://{{ n8n_domain }}
      Username: {{ n8n_basic_auth_user }}
      Data Directory: {{ n8n_data_dir }}
      
      Docker Status:
      - Container: docker ps | grep n8n
      - Logs: docker logs n8n
      
      Management:
      - Start: cd {{ n8n_data_dir }} && docker compose up -d
      - Stop: cd {{ n8n_data_dir }} && docker compose down
      - Restart: cd {{ n8n_data_dir }} && docker compose restart