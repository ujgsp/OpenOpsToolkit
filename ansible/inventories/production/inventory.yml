# Production Inventory
# Managed by Ansible

all:
  children:
    # Load Balancer
    loadbalancers:
      hosts:
        lb1:
          ansible_host: 192.168.1.5
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: loadbalancer
    
    # Web Servers
    webservers:
      hosts:
        web1:
          ansible_host: 192.168.1.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: webserver
          nginx_worker_processes: 4
          nginx_worker_connections: 1024
        
        web2:
          ansible_host: 192.168.1.11
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: webserver
          nginx_worker_processes: 4
          nginx_worker_connections: 1024
    
    # Application Servers
    appservers:
      hosts:
        app1:
          ansible_host: 192.168.1.20
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: appserver
          php_fpm_max_children: 50
          php_fpm_start_servers: 5
          php_fpm_min_spare_servers: 5
          php_fpm_max_spare_servers: 35
        
        app2:
          ansible_host: 192.168.1.21
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: appserver
          php_fpm_max_children: 50
          php_fpm_start_servers: 5
          php_fpm_min_spare_servers: 5
          php_fpm_max_spare_servers: 35
    
    # Database Servers
    dbservers:
      hosts:
        db1:
          ansible_host: 192.168.1.30
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: database
          mysql_max_connections: 200
          mysql_innodb_buffer_pool_size: 1G
        
        db2:
          ansible_host: 192.168.1.31
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: database
          mysql_max_connections: 200
          mysql_innodb_buffer_pool_size: 1G
          mysql_replication_slave: true
    
    # Monitoring Servers
    monitoring:
      hosts:
        monitor1:
          ansible_host: 192.168.1.40
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: monitoring
    
    # Cache Servers
    cache:
      hosts:
        redis1:
          ansible_host: 192.168.1.50
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: cache
          redis_maxmemory: 256mb
          redis_maxmemory_policy: allkeys-lru
    
    # Queue Servers
    queue:
      hosts:
        queue1:
          ansible_host: 192.168.1.60
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          server_role: queue
    
    # All servers
    all_servers:
      children:
        loadbalancers:
        webservers:
        appservers:
        dbservers:
        monitoring:
        cache:
        queue:
  
  vars:
    # Common variables
    ansible_python_interpreter: /usr/bin/python3
    
    # Application
    app_name: myapp
    app_env: production
    app_url: https://example.com
    app_domain: example.com
    
    # Timezone
    timezone: Asia/Jakarta
    
    # SSL
    ssl_enabled: true
    ssl_email: admin@example.com
    
    # Backup
    backup_enabled: true
    backup_schedule: "0 2 * * *"
    backup_retention_days: 7
    
    # Monitoring
    monitoring_enabled: true
    
    # Firewall
    firewall_enabled: true