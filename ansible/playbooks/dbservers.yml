---
# Database Servers Deployment Playbook
# Deploy database servers only

- name: Deploy Database Servers
  hosts: dbservers
  become: yes
  
  tasks:
    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist
    
    - name: Install MySQL
      apt:
        name:
          - mysql-server
          - mysql-client
          - python3-mysqldb
        state: present
    
    - name: Start MySQL
      systemd:
        name: mysql
        state: started
        enabled: yes
    
    - name: Configure MySQL
      template:
        src: templates/mysql.conf.j2
        dest: /etc/mysql/mysql.conf.d/mysqld.cnf
      notify: restart mysql
    
    - name: Create application database
      mysql_db:
        name: "{{ app_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
    
    - name: Create application user
      mysql_user:
        name: "{{ app_name }}"
        password: "{{ vault_db_password }}"
        priv: "{{ app_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
    
    - name: Install Redis
      apt:
        name: redis-server
        state: present
    
    - name: Configure Redis
      template:
        src: templates/redis.conf.j2
        dest: /etc/redis/redis.conf
      notify: restart redis
    
    - name: Start Redis
      systemd:
        name: redis-server
        state: started
        enabled: yes
    
    - name: Health check MySQL
      shell: mysqladmin ping
      register: mysql_health
      until: mysql_health.rc == 0
      retries: 30
      delay: 10
    
    - name: Health check Redis
      shell: redis-cli ping
      register: redis_health
      until: redis_health.stdout == "PONG"
      retries: 30
      delay: 10
  
  handlers:
    - name: restart mysql
      systemd:
        name: mysql
        state: restarted
    
    - name: restart redis
      systemd:
        name: redis-server
        state: restarted