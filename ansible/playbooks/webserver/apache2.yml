---
# Apache2 tasks for Laravel deployment

- name: Install Apache2 and modules
  apt:
    name:
      - apache2
      - libapache2-mod-php{{ laravel_php_version | default('8.2') }}
    state: present
    update_cache: yes

- name: Enable required Apache modules
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - rewrite
    - ssl
    - headers
    - proxy_fcgi
    - setenvif
  notify: restart apache2

- name: Disable default Apache site
  command: a2dissite 000-default.conf
  args:
    removes: /etc/apache2/sites-enabled/000-default.conf
  notify: restart apache2

- name: Configure Apache virtual host
  template:
    src: ../templates/apache2-laravel.conf.j2
    dest: "/etc/apache2/sites-available/{{ laravel_app_name }}.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart apache2

- name: Enable Laravel site
  command: "a2ensite {{ laravel_app_name }}.conf"
  args:
    creates: "/etc/apache2/sites-enabled/{{ laravel_app_name }}.conf"
  notify: restart apache2

- name: Configure Apache for .htaccess
  lineinfile:
    path: /etc/apache2/apache2.conf
    regexp: '<Directory /var/www/>'
    insertafter: '<Directory /var/www/>'
    line: |
      AllowOverride All
  notify: restart apache2

- name: Start and enable Apache2
  systemd:
    name: apache2
    state: started
    enabled: yes
