# Code Quality Checks
# OpenOps Toolkit

name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Ansible linting
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install ansible-lint ansible
      
      - name: Run ansible-lint
        run: |
          ansible-lint ansible/ --exclude=.git

  # 2. YAML linting
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install yamllint
        run: |
          pip install yamllint
      
      - name: Run yamllint
        run: |
          yamllint -c .yamllint .

  # 3. Shell script linting
  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install shellcheck
        run: |
          sudo apt-get install -y shellcheck
      
      - name: Run shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" -exec shellcheck {} \;

  # 4. Markdown linting
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install markdownlint-cli
        run: |
          npm install -g markdownlint-cli
      
      - name: Run markdownlint
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore .git

  # 5. JSON validation
  json-validate:
    name: JSON Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" -exec python3 -m json.tool {} \;

  # 6. Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # 7. Check for secrets
  secrets-check:
    name: Secrets Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
      
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --verbose

  # 8. File permissions check
  permissions-check:
    name: Permissions Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check file permissions
        run: |
          # Check for executable files that shouldn't be
          find . -type f -name "*.yml" -executable -not -path "./.git/*" && echo "Warning: YAML files should not be executable" || true
          find . -type f -name "*.md" -executable -not -path "./.git/*" && echo "Warning: Markdown files should not be executable" || true
          
          # Check for missing executable permission on scripts
          find . -type f -name "*.sh" -not -executable -not -path "./.git/*" && echo "Warning: Shell scripts should be executable" || true

  # 9. All quality checks
  quality-complete:
    name: Quality Checks Complete
    runs-on: ubuntu-latest
    needs:
      - ansible-lint
      - yaml-lint
      - shell-lint
      - markdown-lint
      - json-validate
      - security
      - secrets-check
      - permissions-check
    
    steps:
      - name: All quality checks passed
        run: echo "All code quality checks passed!"