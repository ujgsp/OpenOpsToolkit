# Release Automation
# OpenOps Toolkit

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 1. Create release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-decorate)
          else
            CHANGELOG=$(git log --oneline --no-decorate ${PREV_TAG}..HEAD)
          fi
          
          # Write to file
          echo "$CHANGELOG" > CHANGELOG_RELEASE.md
          
          # Set output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            ```bash
            git clone https://github.com/ujgsp/OpenOpsToolkit.git
            cd OpenOpsToolkit
            git checkout ${{ github.ref_name }}
            ```
            
            ## Documentation
            
            - [README](README.md)
            - [ROADMAP](ROADMAP.md)
            - [CONTRIBUTING](CONTRIBUTING.md)
            
            ## Full Changelog
            
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            CHANGELOG_RELEASE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build and publish
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create release archive
        run: |
          # Create release directory
          mkdir -p release/openops-toolkit-${{ github.ref_name }}
          
          # Copy files
          cp -r ansible n8n monitoring scripts docs examples .github release/openops-toolkit-${{ github.ref_name }}/
          cp README.md ROADMAP.md CONTRIBUTING.md SECURITY.md CHANGELOG.md LICENSE release/openops-toolkit-${{ github.ref_name }}/
          
          # Create archive
          cd release
          tar -czf openops-toolkit-${{ github.ref_name }}.tar.gz openops-toolkit-${{ github.ref_name }}/
          zip -r openops-toolkit-${{ github.ref_name }}.zip openops-toolkit-${{ github.ref_name }}/
      
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/openops-toolkit-${{ github.ref_name }}.tar.gz
            release/openops-toolkit-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3. Update documentation
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Update CHANGELOG
        run: |
          # Add release entry to CHANGELOG
          VERSION=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)
          
          # Create new entry
          ENTRY="## [$VERSION] - $DATE\n\n### Added\n- See release notes for details\n"
          
          # Insert after header
          sed -i "/## \[Unreleased\]/a\\
          \\
          $ENTRY" CHANGELOG.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update CHANGELOG for ${{ github.ref_name }}"
          file_pattern: CHANGELOG.md