# GitHub Labels Configuration
# Managed by Ansible

# Priority Labels
- name: "priority: critical"
  color: "d73a4a"
  description: "Critical issue that needs immediate attention"

- name: "priority: high"
  color: "e99695"
  description: "High priority issue"

- name: "priority: medium"
  color: "fbca04"
  description: "Medium priority issue"

- name: "priority: low"
  color: "0e8a16"
  description: "Low priority issue"

# Type Labels
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

# Status Labels
- name: "status: in progress"
  color: "ededed"
  description: "Currently being worked on"

- name: "status: needs review"
  color: "fbca04"
  description: "Ready for review"

- name: "status: blocked"
  color: "d73a4a"
  description: "Blocked by another issue"

- name: "status: wontfix"
  color: "ffffff"
  description: "This will not be worked on"

# Component Labels
- name: "component: ansible"
  color: "1d76db"
  description: "Related to Ansible roles"

- name: "component: n8n"
  color: "e99695"
  description: "Related to n8n workflows"

- name: "component: monitoring"
  color: "0e8a16"
  description: "Related to monitoring stack"

- name: "component: documentation"
  color: "0075ca"
  description: "Related to documentation"

- name: "component: scripts"
  color: "fbca04"
  description: "Related to scripts"

# Size Labels
- name: "size: small"
  color: "0e8a16"
  description: "Small change"

- name: "size: medium"
  color: "fbca04"
  description: "Medium change"

- name: "size: large"
  color: "e99695"
  description: "Large change"

# Special Labels
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update a dependency file"

- name: "github_actions"
  color: "000000"
  description: "Pull requests that update GitHub Actions code"