---
# =====================================================
# Beresin Deploy Laravel
# Service 2 - Rp 750.000
# =====================================================
# Playbook untuk deploy/fix aplikasi Laravel:
# - Deploy dari repository
# - Fix permissions & symlink
# - Konfigurasi Nginx + SSL
# - Setup Scheduler & Queue Worker
# - Database migration
# - Cache optimization
#
# Usage:
# ansible-playbook -i inventories/production/inventory.yml playbooks/fix-laravel.yml --ask-vault-pass
#
# Variabel wajib di inventory:
# - domain: Domain aplikasi
# - app_repo: Repository URL
# - db_name, db_user, db_password: Database credentials
# =====================================================

- name: Beresin Deploy Laravel
  hosts: laravel_servers
  become: yes
  gather_facts: yes

  vars:
    # Default values
    app_branch: "main"
    app_env: "production"
    php_version: "8.2"
    ssl_enabled: true
    scheduler_enabled: true
    queue_worker_enabled: false

  pre_tasks:
    - name: Display deployment information
      debug:
        msg: |
          ========================================
          Beresin Deploy Laravel
          Application: {{ app_name }}
          Domain: {{ domain }}
          Branch: {{ app_branch }}
          Environment: {{ app_env }}
          ========================================

  roles:
    # 1. System dependencies & PHP
    - role: laravel
      tags: [deploy, laravel]

    # 2. SSL Certificate (if enabled)
    - role: certbot
      when: ssl_enabled | bool
      tags: [ssl, certbot]

  post_tasks:
    # Final Verification
    - name: Verify Nginx is running
      systemd:
        name: nginx
        state: started
      register: nginx_status

    - name: Verify PHP-FPM is running
      systemd:
        name: "php{{ php_version }}-fpm"
        state: started
      register: php_status

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      ignore_errors: yes

    - name: Check application health
      uri:
        url: "http{% if ssl_enabled %}s{% endif %}://{{ domain }}"
        return_content: yes
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200
      ignore_errors: yes

    - name: Display deployment results
      debug:
        msg: |
          ========================================
          ✅ Laravel Deployment Completed!
          
          Application: {{ app_name }}
          URL: http{% if ssl_enabled %}s{% endif %}://{{ domain }}
          Directory: /var/www/{{ app_name }}
          
          Status:
          - Nginx: {{ 'Running' if nginx_status.status.ActiveState == 'active' else 'Error' }}
          - PHP-FPM: {{ 'Running' if php_status.status.ActiveState == 'active' else 'Error' }}
          - Nginx Config: {{ 'OK' if nginx_test.rc == 0 else 'Error' }}
          - Health Check: {{ 'OK' if health_check.status == 200 else 'Failed' }}
          
          {% if scheduler_enabled %}
          Scheduler: Active (runs every minute)
          {% endif %}
          {% if queue_worker_enabled %}
          Queue Worker: Active (Supervisor managed)
          {% endif %}
          
          Logs:
          - Laravel: /var/www/{{ app_name }}/storage/logs/laravel.log
          - Nginx: /var/log/nginx/{{ domain }}-error.log
          - PHP-FPM: /var/log/php{{ php_version }}-fpm.log
          ========================================
