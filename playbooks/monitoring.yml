---
# Monitoring Deployment Playbook
# Deploy Uptime Kuma + Prometheus + Grafana monitoring stack
# Part of OpenOps Toolkit

- name: Deploy Monitoring Stack
  hosts: monitoring
  become: yes
  serial: "50%"

  roles:
    - docker
    - ufw
    - monitoring

  vars:
    monitoring_allowed_ports:
      - "{{ monitoring_uptime_kuma_port }}"
      - "{{ monitoring_prometheus_port }}"
      - "{{ monitoring_grafana_port }}"
      - "{{ monitoring_alertmanager_port }}"
      - "9100"   # Node Exporter

  tasks:
    - name: Allow monitoring ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ monitoring_allowed_ports }}"
