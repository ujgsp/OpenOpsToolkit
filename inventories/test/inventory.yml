---
# Test Inventory — Local Container
# ⚠️ Untuk testing saja, jangan gunakan di production

all:
  children:
    webservers:
      hosts:
        test-vps:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_pass: rootpass
          ansible_host_key_checking: false
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    dbservers:
      hosts:
        test-vps:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_pass: rootpass
          ansible_host_key_checking: false
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    monitoring:
      hosts:
        test-vps:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_pass: rootpass
          ansible_host_key_checking: false
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    appservers:
      hosts:
        test-vps:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_pass: rootpass
          ansible_host_key_checking: false
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    cache:
      hosts:
        test-vps:
          ansible_host: 127.0.0.1
          ansible_port: 2222
          ansible_user: root
          ansible_ssh_pass: rootpass
          ansible_host_key_checking: false
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    all_servers:
      children:
        webservers:
        dbservers:
        monitoring:
        appservers:
        cache:

  vars:
    # Laravel settings for testing
    laravel_app_name: "test-laravel"
    laravel_app_repo: "https://github.com/laravel/laravel.git"
    laravel_app_branch: "11.x"
    laravel_app_env: "local"
    laravel_domain: "test.local"
    laravel_db_name: "test_laravel"
    laravel_db_user: "testuser"
    laravel_db_password: "testpass123"
    laravel_ssl_enabled: false
    laravel_ssl_email: "test@test.local"
    laravel_webserver_type: "nginx"
    php_version: "8.3"
    # Monitoring settings
    app_domain: "test.local"
    vault_smtp_password: "test-smtp-password"
