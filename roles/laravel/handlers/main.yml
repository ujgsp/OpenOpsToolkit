---
# Laravel Role - Handlers

- name: restart nginx
  systemd:
    name: nginx
    state: restarted

- name: restart php-fpm
  systemd:
    name: "php{{ php_version }}-fpm"
    state: restarted

- name: restart mysql
  systemd:
    name: mysql
    state: restarted

- name: reload nginx
  systemd:
    name: nginx
    state: reloaded

- name: reload php-fpm
  systemd:
    name: "php{{ php_version }}-fpm"
    state: reloaded

# Apache2 handlers
- name: restart apache2
  systemd:
    name: apache2
    state: restarted

- name: reload apache2
  systemd:
    name: apache2
    state: reloaded

# OpenLiteSpeed handlers
- name: restart openlitespeed
  systemd:
    name: lsws
    state: restarted

- name: reload openlitespeed
  systemd:
    name: lsws
    state: reloaded

# Supervisor handlers
- name: reload supervisor
  systemd:
    name: supervisor
    state: reloaded

- name: restart supervisor
  systemd:
    name: supervisor
    state: restarted