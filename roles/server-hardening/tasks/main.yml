---
# Server Hardening Role - Main Tasks

# 1. System Updates & Basic Packages
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install essential packages
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - unattended-upgrades
      - logrotate
      - chrony
    state: present

# 2. Timezone Configuration
- name: Set timezone
  timezone:
    name: "{{ server_timezone }}"

# 3. SSH Hardening
- name: Configure SSH daemon
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0644'
    validate: 'sshd -t -f %s'
  notify: restart sshd

# 4. Fail2Ban Installation & Configuration
- name: Install Fail2Ban
  apt:
    name: fail2ban
    state: present

- name: Configure Fail2Ban jail.local
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Enable and start Fail2Ban
  systemd:
    name: fail2ban
    state: started
    enabled: yes

# 5. Kernel Hardening (sysctl)
- name: Apply kernel hardening sysctl settings
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - { name: 'net.ipv4.tcp_syncookies', value: '1' }
    - { name: 'net.ipv4.tcp_max_syn_backlog', value: '2048' }
    - { name: 'net.ipv4.tcp_synack_retries', value: '2' }
    - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
    - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
    - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
    - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
    - { name: 'fs.suid_dumpable', value: '0' }
    - { name: 'kernel.randomize_va_space', value: '2' }

# 6. File Permission Hardening
- name: Set secure permissions on critical files
  file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/passwd', mode: '0644' }
    - { path: '/etc/shadow', mode: '0640' }
    - { path: '/etc/group', mode: '0644' }
    - { path: '/etc/gshadow', mode: '0640' }

# 7. Disable Unnecessary Services
- name: Disable unnecessary services
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - avahi-daemon
    - cups
    - bluetooth
  failed_when: false
  ignore_errors: yes

# 8. Configure Logrotate for auth logs
- name: Configure logrotate for auth
  copy:
    content: |
      /var/log/auth.log {
          weekly
          rotate 4
          compress
          delaycompress
          missingok
          notifempty
          create 0640 root adm
      }
    dest: /etc/logrotate.d/auth
    owner: root
    group: root
    mode: '0644'

# 9. Unattended Security Updates
- name: Configure unattended upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
  when: auto_security_updates | bool

- name: Ensure unattended-upgrades is running
  systemd:
    name: unattended-upgrades
    state: started
    enabled: yes
  when: auto_security_updates | bool
